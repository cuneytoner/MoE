name: moe-pc2-worker

services:
  worker-health-placeholder:
    image: alpine:3.20
    profiles:
      - telemetry
    command: ["sh", "-c", "echo PC-2 worker health placeholder && sleep infinity"]
    environment:
      PC2_RUNTIME_ROOT: ${PC2_RUNTIME_ROOT:-/home/cuneyt/MoE}
      PC2_REPORTS_DIR: ${PC2_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports}
      PC2_WORKER_PORT: ${PC2_WORKER_PORT:-8200}
      PC1_GATEWAY_URL: ${PC1_GATEWAY_URL:-http://192.168.50.1:8100}
    volumes:
      - ${PC2_RUNTIME_ROOT:-/home/cuneyt/MoE}/runtime:/runtime

  nightly-learning-worker:
    build:
      context: ../../apps/nightly-learning-worker
    profiles:
      - learning
    restart: "no"
    environment:
      NIGHTLY_RUNTIME_ROOT: ${NIGHTLY_RUNTIME_ROOT:-/home/cuneyt/MoE/runtime}
      NIGHTLY_REPORTS_DIR: ${NIGHTLY_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/nightly}
      NIGHTLY_SOURCE_ROOT: ${NIGHTLY_SOURCE_ROOT:-/workspace}
      NIGHTLY_GATEWAY_URL: ${NIGHTLY_GATEWAY_URL:-http://192.168.50.1:8100}
      NIGHTLY_MEMORY_API_URL: ${NIGHTLY_MEMORY_API_URL:-http://192.168.50.1:8101}
    ports:
      - "${NIGHTLY_PORT:-8200}:8200"
    volumes:
      - ${NIGHTLY_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/nightly}:/home/cuneyt/MoE/runtime/reports/nightly
      - ${PC2_SOURCE_ROOT:-/home/cuneyt/MoE/codebase}:/workspace:ro

  research-ingestion-worker:
    build:
      context: ../../apps/research-ingestion-worker
    profiles:
      - research
    restart: "no"
    environment:
      RESEARCH_RUNTIME_ROOT: ${RESEARCH_RUNTIME_ROOT:-/home/cuneyt/MoE/runtime}
      RESEARCH_REPORTS_DIR: ${RESEARCH_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/research}
      RESEARCH_SOURCE_ROOT: ${RESEARCH_SOURCE_ROOT:-/workspace}
      RESEARCH_SOURCES_CONFIG: ${RESEARCH_SOURCES_CONFIG:-/workspace/configs/research-sources.example.yaml}
      RESEARCH_GATEWAY_URL: ${RESEARCH_GATEWAY_URL:-http://192.168.50.1:8100}
      RESEARCH_MEMORY_API_URL: ${RESEARCH_MEMORY_API_URL:-http://192.168.50.1:8101}
    ports:
      - "${RESEARCH_PORT:-8210}:8210"
    volumes:
      - ${RESEARCH_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/research}:/home/cuneyt/MoE/runtime/reports/research
      - ${PC2_SOURCE_ROOT:-/home/cuneyt/MoE/codebase}:/workspace:ro

  feedback-worker:
    build:
      context: ../../apps/feedback-worker
    profiles:
      - feedback
    restart: "no"
    environment:
      FEEDBACK_RUNTIME_ROOT: ${FEEDBACK_RUNTIME_ROOT:-/home/cuneyt/MoE/runtime}
      FEEDBACK_DATA_DIR: ${FEEDBACK_DATA_DIR:-/home/cuneyt/MoE/runtime/feedback}
      FEEDBACK_EVENTS_FILE: ${FEEDBACK_EVENTS_FILE:-/home/cuneyt/MoE/runtime/feedback/events.jsonl}
      FEEDBACK_REPORTS_DIR: ${FEEDBACK_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/feedback}
      FEEDBACK_MEMORY_API_URL: ${FEEDBACK_MEMORY_API_URL:-http://192.168.50.1:8101}
    ports:
      - "${FEEDBACK_PORT:-8220}:8220"
    volumes:
      - ${FEEDBACK_DATA_DIR:-/home/cuneyt/MoE/runtime/feedback}:/home/cuneyt/MoE/runtime/feedback
      - ${FEEDBACK_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/feedback}:/home/cuneyt/MoE/runtime/reports/feedback
      - ${PC2_SOURCE_ROOT:-/home/cuneyt/MoE/codebase}:/workspace:ro

  memory-services-placeholder:
    image: alpine:3.20
    profiles:
      - memory-services
    command: ["sh", "-c", "echo Optional memory services migration placeholder && sleep infinity"]
    environment:
      PC2_RUNTIME_ROOT: ${PC2_RUNTIME_ROOT:-/home/cuneyt/MoE}
    volumes:
      - ${PC2_RUNTIME_ROOT:-/home/cuneyt/MoE}/runtime:/runtime
