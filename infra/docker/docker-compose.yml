services:
  embed-worker:
    build:
      context: ../../apps/embed-worker
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-moe}-embed-worker
    restart: unless-stopped
    environment:
      SERVICE_NAME: embed-worker
      EMBED_WORKER_HOST: ${EMBED_WORKER_HOST:-0.0.0.0}
      EMBED_WORKER_PORT: 8102
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-fake}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/models/bge-m3}
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    ports:
      - "${EMBED_WORKER_PORT:-8102}:8102"
    volumes:
      - ${MODEL_BACKUP_DIR:-/home/cuneyt/MoE_Models_Backup}/bge-m3:/models/bge-m3:ro
    networks:
      - moe-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  memory-api:
    build:
      context: ../../apps/memory-api
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-moe}-memory-api
    restart: unless-stopped
    environment:
      SERVICE_NAME: memory-api
      MEMORY_API_PORT: 8101
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-moe}
      POSTGRES_USER: ${POSTGRES_USER:-moe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moe_dev_password}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-moe_memories}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      EMBED_WORKER_INTERNAL_URL: ${EMBED_WORKER_INTERNAL_URL:-http://embed-worker:8102}
    ports:
      - "${MEMORY_API_PORT:-8101}:8101"
    networks:
      - moe-net
    depends_on:
      - embed-worker
      - postgres
      - qdrant
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    container_name: ${PROJECT_NAME:-moe}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moe}
      POSTGRES_USER: ${POSTGRES_USER:-moe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moe_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${RUNTIME_DIR:-/home/cuneyt/MoE/runtime}/postgres:/var/lib/postgresql/data
      - ../postgres/init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - moe-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: ${PROJECT_NAME:-moe}-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ${RUNTIME_DIR:-/home/cuneyt/MoE/runtime}/qdrant:/qdrant/storage
    networks:
      - moe-net

networks:
  moe-net:
    name: ${PROJECT_NAME:-moe}-net
