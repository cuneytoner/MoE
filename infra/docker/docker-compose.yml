services:
  gateway-api:
    build:
      context: ../../apps/gateway-api
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-moe}-gateway-api
    restart: unless-stopped
    environment:
      SERVICE_NAME: gateway-api
      GATEWAY_API_HOST: ${GATEWAY_API_HOST:-0.0.0.0}
      GATEWAY_API_PORT: 8100
      MEMORY_API_URL: http://memory-api:8101
      EMBED_WORKER_URL: http://embed-worker:8102
      MODEL_RUNTIME_URL: ${MODEL_RUNTIME_URL:-http://host.docker.internal:8000/v1}
      MODEL_RUNTIME_PUBLIC_URL: ${MODEL_RUNTIME_PUBLIC_URL:-http://localhost:8000/v1}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-deepseek-coder-lite}
      MODEL_ROUTING_CONFIG: /app/configs/model-routing.yaml
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/workspace}
      WORKSPACE_ENABLED: ${WORKSPACE_ENABLED:-true}
      WORKSPACE_MAX_FILE_BYTES: ${WORKSPACE_MAX_FILE_BYTES:-200000}
      WORKSPACE_MAX_TREE_ITEMS: ${WORKSPACE_MAX_TREE_ITEMS:-500}
      WORKSPACE_ALLOWED_EXTENSIONS: ${WORKSPACE_ALLOWED_EXTENSIONS:-.py,.md,.txt,.yaml,.yml,.json,.toml,.sh,.env.example,.gitignore,.dockerignore,Dockerfile,Makefile}
      MEDIA_API_URL: ${MEDIA_API_URL:-http://media-api:8300}
      MEDIA_API_PUBLIC_URL: ${MEDIA_API_PUBLIC_URL:-http://localhost:8300}
      MEDIA_WORKER_URL: ${MEDIA_WORKER_URL:-http://media-worker:8310}
      PROMPT_INTERPRETER_URL: ${PROMPT_INTERPRETER_URL:-http://192.168.50.2:8230}
      GATEWAY_MEDIA_ENABLED: ${GATEWAY_MEDIA_ENABLED:-true}
      GATEWAY_MEDIA_REAL_ALLOWED: ${GATEWAY_MEDIA_REAL_ALLOWED:-false}
      GATEWAY_MEDIA_DEFAULT_MODE: ${GATEWAY_MEDIA_DEFAULT_MODE:-dry_run}
      MEDIA_DASHBOARD_ENABLED: ${MEDIA_DASHBOARD_ENABLED:-true}
      MEDIA_OUTPUTS_DIR: ${MEDIA_OUTPUTS_DIR:-/home/cuneyt/MoE/runtime/media/outputs}
      MEDIA_DASHBOARD_MAX_IMAGES: ${MEDIA_DASHBOARD_MAX_IMAGES:-20}
      RUNTIME_DASHBOARD_ENABLED: ${RUNTIME_DASHBOARD_ENABLED:-true}
      MEDIA_JOBS_DIR: ${MEDIA_JOBS_DIR:-/home/cuneyt/MoE/runtime/media/jobs}
      RUNTIME_DASHBOARD_MAX_JOBS: ${RUNTIME_DASHBOARD_MAX_JOBS:-5}
      LLAMA_SERVER_URL: ${LLAMA_SERVER_URL:-http://host.docker.internal:8000}
      PC2_PROMPT_INTERPRETER_URL: ${PC2_PROMPT_INTERPRETER_URL:-http://192.168.50.2:8230}
      PC2_NIGHTLY_URL: ${PC2_NIGHTLY_URL:-http://192.168.50.2:8200}
      PC2_RESEARCH_URL: ${PC2_RESEARCH_URL:-http://192.168.50.2:8210}
      PC2_FEEDBACK_URL: ${PC2_FEEDBACK_URL:-http://192.168.50.2:8220}
      CONTROL_API_URL: ${CONTROL_API_URL:-http://host.docker.internal:8400}
      COMFYUI_URL: ${COMFYUI_URL:-http://host.docker.internal:8188}
    ports:
      - "${GATEWAY_API_PORT:-8100}:8100"
    volumes:
      - ../../configs/model-routing.yaml:/app/configs/model-routing.yaml:ro
      - ../../:/workspace:ro
      - ${MEDIA_OUTPUTS_DIR:-/home/cuneyt/MoE/runtime/media/outputs}:/home/cuneyt/MoE/runtime/media/outputs:ro
      - ${MEDIA_JOBS_DIR:-/home/cuneyt/MoE/runtime/media/jobs}:/home/cuneyt/MoE/runtime/media/jobs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - moe-net
    depends_on:
      - memory-api
      - embed-worker
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/gateway/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  embed-worker:
    build:
      context: ../../apps/embed-worker
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-moe}-embed-worker
    restart: unless-stopped
    environment:
      SERVICE_NAME: embed-worker
      EMBED_WORKER_HOST: ${EMBED_WORKER_HOST:-0.0.0.0}
      EMBED_WORKER_PORT: 8102
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-fake}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/models/bge-m3}
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    ports:
      - "${EMBED_WORKER_PORT:-8102}:8102"
    volumes:
      - ${MODEL_BACKUP_DIR:-/home/cuneyt/MoE_Models_Backup}/bge-m3:/models/bge-m3:ro
    networks:
      - moe-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  memory-api:
    build:
      context: ../../apps/memory-api
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-moe}-memory-api
    restart: unless-stopped
    environment:
      SERVICE_NAME: memory-api
      MEMORY_API_PORT: 8101
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-moe}
      POSTGRES_USER: ${POSTGRES_USER:-moe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moe_dev_password}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      EMBED_WORKER_INTERNAL_URL: ${EMBED_WORKER_INTERNAL_URL:-http://embed-worker:8102}
    ports:
      - "${MEMORY_API_PORT:-8101}:8101"
    networks:
      - moe-net
    depends_on:
      - embed-worker
      - postgres
      - qdrant
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    container_name: ${PROJECT_NAME:-moe}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moe}
      POSTGRES_USER: ${POSTGRES_USER:-moe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moe_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${RUNTIME_DIR:-/home/cuneyt/MoE/runtime}/postgres:/var/lib/postgresql/data
      - ../postgres/init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - moe-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: ${PROJECT_NAME:-moe}-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ${RUNTIME_DIR:-/home/cuneyt/MoE/runtime}/qdrant:/qdrant/storage
    networks:
      - moe-net

  media-api:
    build:
      context: ../../apps/media-api
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-moe}-media-api
    profiles:
      - media
    restart: "no"
    environment:
      MEDIA_SERVICE_NAME: media-api
      MEDIA_API_PORT: 8300
      MEDIA_RUNTIME_ROOT: ${MEDIA_RUNTIME_ROOT:-/home/cuneyt/MoE/runtime}
      MEDIA_ROOT: ${MEDIA_ROOT:-/home/cuneyt/MoE/runtime/media}
      MEDIA_JOBS_DIR: ${MEDIA_JOBS_DIR:-/home/cuneyt/MoE/runtime/media/jobs}
      MEDIA_OUTPUTS_DIR: ${MEDIA_OUTPUTS_DIR:-/home/cuneyt/MoE/runtime/media/outputs}
      MEDIA_REPORTS_DIR: ${MEDIA_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/media}
      MEDIA_REAL_GENERATION_ENABLED: ${MEDIA_REAL_GENERATION_ENABLED:-false}
      MEDIA_WORKER_URL: ${MEDIA_WORKER_URL:-http://media-worker:8310}
    ports:
      - "${MEDIA_API_PORT:-8300}:8300"
    volumes:
      - ${MEDIA_ROOT:-/home/cuneyt/MoE/runtime/media}:/home/cuneyt/MoE/runtime/media
      - ${MEDIA_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/media}:/home/cuneyt/MoE/runtime/reports/media
    networks:
      - moe-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  media-worker:
    build:
      context: ../../apps/media-worker
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-moe}-media-worker
    profiles:
      - media
    restart: "no"
    environment:
      MEDIA_WORKER_SERVICE_NAME: media-worker
      MEDIA_WORKER_PORT: 8310
      MEDIA_JOBS_DIR: ${MEDIA_JOBS_DIR:-/home/cuneyt/MoE/runtime/media/jobs}
      MEDIA_REPORTS_DIR: ${MEDIA_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/media}
      MEDIA_REAL_GENERATION_ENABLED: ${MEDIA_REAL_GENERATION_ENABLED:-false}
      MEDIA_OUTPUT_ROOT: ${MEDIA_OUTPUT_ROOT:-/home/cuneyt/MoE/runtime/media/outputs}
      COMFYUI_URL: ${COMFYUI_URL:-http://host.docker.internal:8188}
      COMFYUI_OUTPUT_DIR: ${COMFYUI_OUTPUT_DIR:-/home/cuneyt/MoE/runtime/media-engines/comfyui/ComfyUI/output}
    ports:
      - "${MEDIA_WORKER_PORT:-8310}:8310"
    volumes:
      - ${MEDIA_ROOT:-/home/cuneyt/MoE/runtime/media}:/home/cuneyt/MoE/runtime/media
      - ${MEDIA_REPORTS_DIR:-/home/cuneyt/MoE/runtime/reports/media}:/home/cuneyt/MoE/runtime/reports/media
    networks:
      - moe-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard-ui:
    build:
      context: ../../apps/dashboard-ui
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-moe}-dashboard-ui
    profiles:
      - dashboard
    restart: "no"
    environment:
      VITE_GATEWAY_API_URL: ${VITE_GATEWAY_API_URL:-http://127.0.0.1:8100}
    ports:
      - "${DASHBOARD_UI_PORT:-8500}:8500"
    networks:
      - moe-net
    depends_on:
      - gateway-api

networks:
  moe-net:
    name: ${PROJECT_NAME:-moe}-net
