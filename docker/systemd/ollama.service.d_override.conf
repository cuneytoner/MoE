[Service]
Environment="OLLAMA_HOST=0.0.0.0:11434"
# Force Ollama to handle massive hybrid RAM/VRAM offloading without pipeline stalls
Environment="OLLAMA_NUM_PARALLEL=1"

# Enable state-of-the-art Flash Attention globally to drastically cut context VRAM usage
Environment="OLLAMA_FLASH_ATTENTION=1"

# Force precise matrix math splits between your Ryzen 7 CPU threads and Cuda cores
Environment="OLLAMA_NOPRUNE=1"
