version: '3.8'

services:
  # 1. Central Core System Orchestrator Frontend (React UI Matrix)
  dashboard-frontend:
    image: node:18-slim
    container_name: moe-dashboard-frontend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ~/MoE/dashboard/frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    networks:
      - moe-cluster-net

  # 2. ComfyUI Media Inference Engine (Hardened Autonomous Video Layer Cores)
  media-inference-engine:
    image: docker-media-inference-engine
    container_name: comfyui-media-engine
    restart: always
    ports:
      - "8188:8188"
    environment:
      - CUDA_VISIBLE_DEVICES=0
    # FIXED PIPELINE: Enforces explicit compilation of opencv alongside diffusers matrix before initialization
    command: >
      sh -c "
      pip install --no-cache-dir gguf diffusers accelerate transformers opencv-python-headless &&
      echo '>>> Initialization complete. Triggering clean ComfyUI scan engine...' &&
      python3 main.py --listen 0.0.0.0 --port 8188 --fp8_e4m3fn-text-enc --fp8_e4m3fn-unet --fp16-vae --use-pytorch-cross-attention --enable-dynamic-vram
      "

    volumes:
      - ~/MoE/media_outputs:/workspace/output
      - ~/MoE/models/checkpoints:/workspace/models/checkpoints
      - ~/MoE/models/checkpoints:/workspace/models/diffusion_models
      - ~/MoE/models/checkpoints:/workspace/models/unet
      # FIXED ABSOLUTE MOUNT: Overrides virtual named storage boundaries to ensure physical node tracking
      - /home/cuneyt/MoE/custom_nodes:/workspace/custom_nodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - moe-cluster-net

    # 3. Distributed LLM Inference Engine (Hardened Server-CUDA Matrix Core)
  llama-cpp-engine:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp-engine
    restart: always
    ports:
      - "8000:8080"
    volumes:
      - ~/MoE/models/checkpoints:/models
    environment:
      - CUDA_VISIBLE_DEVICES=0
    # FIXED: Restored automated explicit model pinning for Aider and Open-WebUI linkage
    # FIXED: Removed the redundant entrypoint path to prevent invalid argument loops
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--model"
      - "/models/qwen2.5-coder-32b-instruct-q4_k_m.gguf"
      - "--threads"
      - "8"
      - "--ngl"
      - "48"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - moe-cluster-net
  # 4. Central Orchestration Dashboard Backend (FastAPI Engine - Host Network Mode)
  dashboard-backend:
    image: python:3.10-slim
    container_name: moe-dashboard-backend
    restart: always
    network_mode: host
    volumes:
      - ~/MoE/dashboard/backend:/app
      - ~/MoE/models/checkpoints:/home/cuneyt/MoE/models/checkpoints
      - /home/cuneyt/DiskD/Projects/MoE/.env:/home/cuneyt/DiskD/Projects/MoE/.env
      - ~/.ssh:/root/.ssh:ro
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y openssh-client && python3 -m pip install --upgrade pip && pip install requests fastapi uvicorn huggingface_hub && uvicorn main:app --host 0.0.0.0 --port 8050 --reload"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 5. Core Ecosystem User Interface (Open-WebUI Platform Matrix)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://llama-cpp-engine:8080/v1
      - OPENAI_API_KEY=sk-moe-cluster-orchestrator-key
      # TOKEN ENJECTION: Powers autonomous internal model harvesting securely without rate limits
      - HF_TOKEN=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
    networks:
      - moe-cluster-net

volumes:
  open-webui-data:

networks:
  moe-cluster-net:
    name: moe_cluster_network
