services:
  # 1. Primary UI Layer & Multi-Modal Orchestrator
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://172.17.0.1:11434
      - ENABLE_IMAGE_GENERATION=True
      - IMAGE_GENERATION_ENGINE=comfyui
      # CRITICAL FIX: Point directly to the container service name and port
      - COMFYUI_BASE_URL=http://media-inference-engine:8188
      - ENABLE_RAG=True
      - RAG_EMBEDDING_MODEL=all-MiniLM-L6-v2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - moe-cluster-net
    depends_on:
      - media-inference-engine

  # 2. Heavy Media Inference Engine (Localized Dockerfile Build)
  media-inference-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comfyui-media-engine
    restart: always
    ports:
      - "8188:8188"
    volumes:
      - ~/MoE/media_outputs:/workspace/output
      - ~/MoE/models/checkpoints:/workspace/models/checkpoints
      - ~/MoE/models/checkpoints:/workspace/models/diffusion_models
      # SYSTEMIC FIXED: Direct host node mapping to ensure plug-and-play extensions
      - ~/MoE/custom_nodes:/workspace/custom_nodes
      - comfyui-data:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - moe-cluster-net

  # 3. Native Llama.cpp Engine - INSANE SPEED MOE CONFIGURATION (Based on Video Guide)
  # 3. Native Llama.cpp Engine (Optimized Dense 32B Memory Allocation)
  llama-cpp-engine:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp-engine
    restart: always
    ports:
      - "8000:8080"
    volumes:
      - ~/MoE/models/checkpoints:/models
    environment:
      - CUDA_VISIBLE_DEVICES=0
    # Context balanced to 32k to safely house the 7GB compressed KV cache alongside 32B model layers
    command:
      - "--model"
      - "/models/qwen2.5-coder-32b-instruct-q4_k_m.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "28"
      - "--flash-attn"
      - "on"
      - "--cache-type-k"
      - "q4_0"
      - "--cache-type-v"
      - "q4_0"
      - "--ctx-size"
      - "32768"
      - "--threads"
      - "8"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - moe-cluster-net

  # 4. Central Orchestration Dashboard Backend (FastAPI Engine)
  # 4. Central Orchestration Dashboard Backend (FastAPI Engine - Host Network Mode)
  # 4. Central Orchestration Dashboard Backend (Hardened Dynamic Telemetry Node)
  dashboard-backend:
    image: python:3.10-slim
    container_name: moe-dashboard-backend
    restart: always
    network_mode: host
    volumes:
      - ~/MoE/dashboard/backend:/app
      - ~/MoE/models/checkpoints:/home/cuneyt/MoE/models/checkpoints
      - /home/cuneyt/DiskD/Projects/MoE/.env:/home/cuneyt/DiskD/Projects/MoE/.env
      # Bound master host ssh registry to instantly trust local cluster nodes
      - ~/.ssh:/root/.ssh:ro
    working_dir: /app
    # Installs native openssh client on boot before firing the uvicorn polling loop
    command: sh -c "apt-get update && apt-get install -y openssh-client && python3 -m pip install --upgrade pip && pip install requests fastapi uvicorn huggingface_hub && uvicorn main:app --host 0.0.0.0 --port 8050 --reload"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 5. Central Orchestration Dashboard Frontend (React Web Space)
  dashboard-frontend:
    image: node:18-slim
    container_name: moe-dashboard-frontend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ~/MoE/dashboard/frontend:/app
    working_dir: /app
    # Swapped production build server to live dev engine to guarantee no internal permissions crashes
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    networks:
      - moe-cluster-net


networks:
  moe-cluster-net:
    name: moe_cluster_network
    driver: bridge

volumes:
  open-webui-data:
    name: open_webui_storage
  comfyui-data:
    name: comfyui_models_storage

  # 3. Native Llama.cpp High-Performance Inference Engine (Bypasses Ollama Overhead)
