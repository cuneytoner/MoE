schema_version: "1.0"
request_id: "object-transform-demo"
output_plan_id: "object-transform-demo-plan"
title: "Move and rotate a static object"
description: "Deterministic source-only object transform example"

mode: "dry_run"
visual_reference_only: true
structural_certification: false
operator_review_required: true

timeline:
  fps: 24
  start_frame: 1
  end_frame: 120

scene:
  source_scene:
    type: "existing_runtime_3d_asset"
    reference_id: "example-only"
  units: "meters"

object:
  object_id: "demo-object"

motion:
  type: "transform_between"
  interpolation: "bezier"

  start:
    location: [0.0, 0.0, 0.0]
    rotation_euler_degrees: [0.0, 0.0, 0.0]
    scale: [1.0, 1.0, 1.0]

  end:
    location: [2.0, 0.0, 1.0]
    rotation_euler_degrees: [0.0, 0.0, 90.0]
    scale: [1.0, 1.0, 1.0]

visibility:
  enabled: false
  start_visible: true
  end_visible: true
  interpolation: "constant"

outputs:
  preview:
    enabled: false
    format: "mp4"
    relative_runtime_path: "media/animation/previews/object-transform-demo.mp4"
  metadata:
    relative_runtime_path: "media/animation/metadata/object-transform-demo.json"

safety:
  real_animation_enabled: false
  blender_execution_enabled: false
  preview_render_enabled: false
  source_assets_modified: false
  runtime_write_planned: false
